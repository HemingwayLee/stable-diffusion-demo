services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdpassword}
      POSTGRES_DB: ${POSTGRES_DB:-sddb}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sduser} -d ${POSTGRES_DB:-sddb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # For CPU-only (no NVIDIA GPU):
      #   args:
      #     TORCH_INDEX: https://download.pytorch.org/whl/cpu
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sduser}:${POSTGRES_PASSWORD:-sdpassword}@db:5432/${POSTGRES_DB:-sddb}
    volumes:
      - ./backend:/app
      - ./images:/app/images
      - ./models:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
